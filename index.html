
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dual Hand Particle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{margin:0;overflow:hidden;background:#000;color:#0ff;font-family:sans-serif;}
#hud{position:absolute;top:10px;left:10px;z-index:10;background:#0008;padding:10px;}
#help{position:absolute;bottom:10px;left:10px;font-size:13px;opacity:0.8}
#video{position:absolute;bottom:10px;right:10px;width:140px;opacity:.6;}
#startBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
</style>
</head>

<body>

<div id="hud">
Hands: <span id="hands">0</span><br>
Gesture: <span id="gesture">None</span><br>
Mode: <span id="mode">Single</span>
</div>

<div id="help">
✋ Palm = Repel<br>
✊ Fist = Attract<br>
🖐️🖐️ Dual = Energy field
</div>

<button id="startBtn">Start</button>
<video id="video" autoplay playsinline></video>

<script>

let scene,camera,renderer,points;
const COUNT=20000;

let pos=new Float32Array(COUNT*3);
let vel=new Float32Array(COUNT*3);
let col=new Float32Array(COUNT*3);

let hand1=null;
let hand2=null;

let currentGesture="Palm";

let handQuat=new THREE.Quaternion();

function initThree(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,100);
camera.position.z=5;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

let geo=new THREE.BufferGeometry();

for(let i=0;i<COUNT;i++){
let i3=i*3;

pos[i3]=(Math.random()-0.5)*5;
pos[i3+1]=(Math.random()-0.5)*5;
pos[i3+2]=(Math.random()-0.5)*5;

vel[i3]=(Math.random()-0.5)*0.02;
vel[i3+1]=(Math.random()-0.5)*0.02;
vel[i3+2]=(Math.random()-0.5)*0.02;

col[i3]=Math.random();
col[i3+1]=Math.random();
col[i3+2]=1;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
geo.setAttribute("color",new THREE.BufferAttribute(col,3));

let mat=new THREE.PointsMaterial({
size:0.03,
vertexColors:true,
transparent:true,
blending:THREE.AdditiveBlending
});

points=new THREE.Points(geo,mat);
scene.add(points);
}

function getHandRotation(lm){

const xAxis=new THREE.Vector3(
lm[17].x-lm[5].x,
lm[17].y-lm[5].y,
lm[17].z-lm[5].z
).normalize();

const yAxis=new THREE.Vector3(
lm[9].x-lm[0].x,
lm[9].y-lm[0].y,
lm[9].z-lm[0].z
).normalize();

const zAxis=new THREE.Vector3().crossVectors(xAxis,yAxis).normalize();

const m=new THREE.Matrix4();
m.makeBasis(xAxis,yAxis,zAxis);

return new THREE.Quaternion().setFromRotationMatrix(m);
}

function isFist(lm){

let curl=0;

curl += lm[8].y > lm[6].y ? 1 : 0;
curl += lm[12].y > lm[10].y ? 1 : 0;
curl += lm[16].y > lm[14].y ? 1 : 0;
curl += lm[20].y > lm[18].y ? 1 : 0;

return curl >= 3;
}

function update(){

for(let i=0;i<COUNT;i++){
let i3=i*3;

if(hand1){
let dx=hand1.x-pos[i3];
let dy=hand1.y-pos[i3+1];
let dz=hand1.z-pos[i3+2];

let d=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

dx/=d;dy/=d;dz/=d;

if(currentGesture==="Palm"){
vel[i3]-=dx*0.01;
vel[i3+1]-=dy*0.01;
vel[i3+2]-=dz*0.01;
}

if(currentGesture==="Fist"){
vel[i3]+=dx*0.01;
vel[i3+1]+=dy*0.01;
vel[i3+2]+=dz*0.01;
}
}

pos[i3]+=vel[i3];
pos[i3+1]+=vel[i3+1];
pos[i3+2]+=vel[i3+2];

vel[i3]*=0.97;
vel[i3+1]*=0.97;
vel[i3+2]*=0.97;
}

points.geometry.attributes.position.needsUpdate=true;
}

function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}

function startHands(){

const hands=new Hands({
locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
});

hands.onResults(res=>{

hand1=null;
hand2=null;

document.getElementById("hands").innerText=res.multiHandLandmarks.length;
document.getElementById("mode").innerText=res.multiHandLandmarks.length>1?"Dual":"Single";

if(res.multiHandLandmarks[0]){
let lm=res.multiHandLandmarks[0];

hand1={
x:(lm[9].x*2-1)*3,
y:-(lm[9].y*2-1)*2,
z:-lm[9].z*5
};

handQuat=getHandRotation(lm);
points.quaternion.slerp(handQuat,0.2);

currentGesture=isFist(lm)?"Fist":"Palm";

document.getElementById("gesture").innerText=currentGesture;
}

if(res.multiHandLandmarks[1]){
let lm=res.multiHandLandmarks[1];

hand2={
x:(lm[9].x*2-1)*3,
y:-(lm[9].y*2-1)*2,
z:-lm[9].z*5
};
}
});

const cam=new Camera(video,{
onFrame:async()=>await hands.send({image:video}),
width:640,
height:480
});

cam.start();
}

document.getElementById("startBtn").onclick=async()=>{

startBtn.style.display="none";

const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

await new Promise(r=>video.onloadedmetadata=()=>{video.play();r();});

initThree();
startHands();
animate();
};

</script>

</body>
</html>
