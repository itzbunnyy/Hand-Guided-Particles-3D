<!--
HOW TO USE:
1. Open in Chrome
2. Click Start Camera
3. Allow webcam
4. Use gestures:
   ✋ Palm → Repel
   ✊ Fist → Attract
   🤏 Pinch → Color change
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Single Hand Particle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body{margin:0;overflow:hidden;background:#000;color:#0ff;font-family:sans-serif;}
#ui{position:absolute;top:10px;left:10px;z-index:10;}
#video{position:absolute;bottom:10px;right:10px;width:140px;opacity:.6;}
#startBtn{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
background:#0ff2;border:1px solid #0ff;color:#0ff;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
Gesture: <span id="gesture">None</span><br>
FPS: <span id="fps">0</span>
</div>

<button id="startBtn">Start Camera</button>
<video id="video" autoplay playsinline></video>

<script>
// ===================== THREE =====================
let scene,camera,renderer,points;
const COUNT=70000;

let pos=new Float32Array(COUNT*3);
let vel=new Float32Array(COUNT*3);
let col=new Float32Array(COUNT*3);

let mouse3D=new THREE.Vector3();
let handRotation=0;
let handScale=1;
let gesture="None";

// ===================== INIT =====================
function init(){
    scene=new THREE.Scene();

    camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,100);
    camera.position.z=5;

    renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(renderer.domElement);

    let geo=new THREE.BufferGeometry();

    for(let i=0;i<COUNT;i++){
        let i3=i*3;
        pos[i3]=(Math.random()-0.5)*5;
        pos[i3+1]=(Math.random()-0.5)*5;
        pos[i3+2]=(Math.random()-0.5)*5;

        vel[i3]=(Math.random()-0.5)*0.02;
        vel[i3+1]=(Math.random()-0.5)*0.02;
        vel[i3+2]=(Math.random()-0.5)*0.02;

        col[i3]=Math.random();
        col[i3+1]=Math.random();
        col[i3+2]=1;
    }

    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",new THREE.BufferAttribute(col,3));

    let mat=new THREE.PointsMaterial({
        size:0.03,
        vertexColors:true,
        transparent:true,
        blending:THREE.AdditiveBlending
    });

    points=new THREE.Points(geo,mat);
    scene.add(points);
}

// ===================== PARTICLES =====================
function update(){
    for(let i=0;i<COUNT;i++){
        let i3=i*3;

        let dx=mouse3D.x-pos[i3];
        let dy=mouse3D.y-pos[i3+1];
        let dz=mouse3D.z-pos[i3+2];

        let d=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

        dx/=d;dy/=d;dz/=d;

        if(gesture==="Palm"){
            vel[i3]-=dx*0.01;
            vel[i3+1]-=dy*0.01;
            vel[i3+2]-=dz*0.01;
        }

        if(gesture==="Fist"){
            vel[i3]+=dx*0.01;
            vel[i3+1]+=dy*0.01;
            vel[i3+2]+=dz*0.01;
        }

        pos[i3]+=vel[i3];
        pos[i3+1]+=vel[i3+1];
        pos[i3+2]+=vel[i3+2];

        vel[i3]*=0.98;
        vel[i3+1]*=0.98;
        vel[i3+2]*=0.98;
    }

    points.geometry.attributes.position.needsUpdate=true;
}

// ===================== LOOP =====================
let last=performance.now();
function animate(){
    requestAnimationFrame(animate);

    let now=performance.now();
    let dt=(now-last)/1000;
    last=now;

    points.rotation.z+=(handRotation-points.rotation.z)*0.15;
    update();

    renderer.render(scene,camera);
    fps.innerText=Math.round(1/dt);
}

// ===================== MEDIAPIPE FIX =====================
let video=document.getElementById("video");

function initHands(){
    const hands=new Hands({
        locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    hands.setOptions({
        maxNumHands:1,
        modelComplexity:1,
        minDetectionConfidence:0.6,
        minTrackingConfidence:0.6
    });

    hands.onResults(results=>{
        if(!results.multiHandLandmarks.length) return;

        const lm=results.multiHandLandmarks[0];

        mouse3D.set(
            (lm[9].x*2-1)*3,
            -(lm[9].y*2-1)*2,
            -lm[9].z*5
        );

        let dx=lm[17].x-lm[5].x;
        let dy=lm[17].y-lm[5].y;
        handRotation=Math.atan2(dy,dx);

        detectGesture(lm);
    });

    // 🔥 FIXED LOOP (IMPORTANT)
    async function loop(){
        if(video.readyState===4){
            await hands.send({image:video});
        }
        requestAnimationFrame(loop);
    }
    loop();
}

// ===================== GESTURE FIX =====================
function detectGesture(lm){
    const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

    let pinch=dist(lm[4],lm[8])<0.05;
    let fist=lm[8].y>lm[6].y;

    if(pinch){
        gesture="Pinch";
        cycleColors();
    }
    else if(fist){
        gesture="Fist";
    }
    else{
        gesture="Palm";
    }

    document.getElementById("gesture").innerText=gesture;
}

// ===================== COLORS =====================
function cycleColors(){
    for(let i=0;i<COUNT;i++){
        let i3=i*3;
        col[i3]=Math.random();
        col[i3+1]=Math.random();
        col[i3+2]=Math.random();
    }
    points.geometry.attributes.color.needsUpdate=true;
}

// ===================== START FIX =====================
document.getElementById("startBtn").onclick=async()=>{
    document.getElementById("startBtn").style.display="none";

    const stream=await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject=stream;

    await new Promise(r=>{
        video.onloadedmetadata=()=>{video.play();r();}
    });

    init();
    initHands();
    animate();
};

// ===================== RESIZE =====================
window.addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
